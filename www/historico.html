<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Histórico de Coletas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
</head>
<body style="background:#f7f7f7;">
  <div style="max-width:600px;margin:32px auto 0 auto;padding:24px;background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,0.06);">
    <h2 style="color:#388e3c;text-align:center;margin-bottom:24px;">Histórico de Coletas</h2>
    <div id="historico-detalhado"></div>
    <button onclick="window.history.back()" style="margin:24px auto 0 auto;display:block;padding:10px 24px;background:#388e3c;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Voltar</button>
  </div>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      if (window.GreenTechApp && window.GreenTechApp.renderHistoricoDetalhado) {
        await window.GreenTechApp.renderHistoricoDetalhado();
      }
    });
  </script>
</body>
</html>
